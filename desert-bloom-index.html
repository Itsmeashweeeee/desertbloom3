<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desert Bloom</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

</head>
<body>

<header class="app-header">
<div class="header-inner">
<h1 class="app-title">🌵 Desert Bloom</h1>

<div class="streak-badge">
<span id="streak-count">0</span>
<span class="streak-label">day streak</span>
</div>

</div>
</header>


<nav class="tab-bar">
<button class="tab-btn active" data-tab="home">Home</button>
<button class="tab-btn" data-tab="tasks">Tasks</button>
<button class="tab-btn" data-tab="history">History</button>
<button class="tab-btn" data-tab="settings">Settings</button>
</nav>


<main class="app-main">


<!-- HOME -->
<section id="tab-home" class="tab-panel active">

<div class="home-greeting-block">
<p id="greeting-text" class="home-greeting-text">Good morning.</p>
<p class="home-subtext">Let's get started.</p>
</div>


<div class="desert-scene">
<canvas id="main-cactus" width="300" height="260"></canvas>
</div>


<div class="desert-stats-inline">

<div class="stat-row">
<span class="stat-label">Growth level</span>
<span class="stat-val" id="growth-level">0</span>
</div>

<div class="stat-row">
<span class="stat-label">Total completed</span>
<span class="stat-val" id="total-completed">0</span>
</div>

<div class="stat-row">
<span class="stat-label">Current streak</span>
<span class="stat-val" id="desert-streak">0 days</span>
</div>

<div class="progress-wrap">
<div class="progress-bar-bg">
<div class="progress-bar-fill" id="growth-bar"></div>
</div>
<p class="progress-label" id="progress-label">0 / 10 to next level</p>
</div>

</div>


<div class="today-progress-wrap">
<div class="today-progress-bar-bg">
<div class="today-progress-bar-fill" id="today-progress-fill"></div>
</div>

<span class="today-progress-label" id="today-progress-label">0 of 0 done</span>
</div>


<ul id="home-task-list" class="checklist"></ul>


<!-- WELLNESS TRACKER -->
<div class="wellness-card">

<h2 class="section-title">Wellness</h2>

<div class="wellness-row">

<div class="wellness-label">
Water today
</div>

<div class="water-controls">

<button id="water-minus-btn" class="water-btn">-</button>

<span id="water-count" class="water-count">
0
</span>

<button id="water-plus-btn" class="water-btn">+</button>

</div>

<div class="water-hint">
glasses
</div>

</div>


<div class="wellness-row">

<div class="wellness-label">
Cycle
</div>

<select id="flow-input">

<option value="none">No flow</option>
<option value="light">Light</option>
<option value="medium">Medium</option>
<option value="heavy">Heavy</option>

</select>

<div id="flow-today" class="flow-text">
No flow
</div>

</div>

</div>


</section>


<!-- TASKS -->
<section id="tab-tasks" class="tab-panel">

<div class="add-task-form">

<h2 class="section-title">
Add a Task
</h2>

<input type="text" id="task-name-input" placeholder="Task name…" maxlength="80">

<div class="form-row">

<input type="time" id="task-time-input">

<select id="task-repeat-input">

<option value="daily">Daily</option>
<option value="weekly">Weekly</option>
<option value="once">One-time</option>

</select>

</div>

<button class="btn-primary btn-full" id="add-task-btn">
+ Add Task
</button>

</div>


<h2 class="section-title">
All Tasks
</h2>

<ul id="all-task-list" class="task-list"></ul>

</section>



<!-- HISTORY -->
<section id="tab-history" class="tab-panel">

<h2 class="section-title">
Completion History
</h2>

<ul id="history-list" class="history-list"></ul>

</section>



<!-- SETTINGS -->
<section id="tab-settings" class="tab-panel">

<h2 class="section-title">
Data
</h2>

<div class="settings-card">

<button class="btn-danger btn-full" id="reset-btn">
Reset all data
</button>

</div>

</section>


</main>

<div id="toast" class="toast hidden"></div>

<script src="app.js"></script>

</body>
</html>
